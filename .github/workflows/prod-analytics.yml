name: Apply Production Analytics Config

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analytics:
    name: Configure PostHog and Clarity on prod
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          set -eu
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_HOST"
          : "${SSH_PORT:=22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          for attempt in 1 2 3; do
            if ssh-keyscan -T 10 -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "SSH keyscan did not return a host key, continuing with StrictHostKeyChecking=accept-new"
            else
              sleep 3
            fi
          done

      - name: Update prod analytics env and restart web
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          APP_DIR: ${{ secrets.PROD_APP_DIR }}
          POSTHOG_API_KEY: phc_vsfSO3JJxnpoMIc0JxqItXivoQxSWT6UWuRiAqtybzm
          POSTHOG_HOST: https://eu.posthog.com
          CLARITY_PROJECT_ID: vt1i478bxy
          ANALYTICS_REQUIRE_CONSENT: "1"
        run: |
          set -eu
          : "${SSH_PORT:=22}"
          : "${SSH_USER:=root}"
          : "${APP_DIR:=/opt/servio}"
          timeout --foreground 300 ssh \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            -o StrictHostKeyChecking=accept-new \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "APP_DIR='$APP_DIR' POSTHOG_API_KEY='$POSTHOG_API_KEY' POSTHOG_HOST='$POSTHOG_HOST' CLARITY_PROJECT_ID='$CLARITY_PROJECT_ID' ANALYTICS_REQUIRE_CONSENT='$ANALYTICS_REQUIRE_CONSENT' bash -s" <<'EOSSH'
          set -euo pipefail
          cd "$APP_DIR"
          python3 - <<'PY2'
from pathlib import Path
import os
path = Path('backend/.env')
text = path.read_text()
updates = {
    'POSTHOG_API_KEY': os.environ['POSTHOG_API_KEY'],
    'POSTHOG_HOST': os.environ['POSTHOG_HOST'],
    'CLARITY_PROJECT_ID': os.environ['CLARITY_PROJECT_ID'],
    'ANALYTICS_REQUIRE_CONSENT': os.environ['ANALYTICS_REQUIRE_CONSENT'],
}
lines = text.splitlines()
seen = set()
out = []
for line in lines:
    replaced = False
    for key, value in updates.items():
        if line.startswith(key + '='):
            out.append(f'{key}={value}')
            seen.add(key)
            replaced = True
            break
    if not replaced:
        out.append(line)
for key, value in updates.items():
    if key not in seen:
        out.append(f'{key}={value}')
path.write_text('\n'.join(out) + '\n')
PY2
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d backend nginx
          docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
          EOSSH
