{% extends "shopfront/base.html" %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="card bg-base-100">
    <div class="card-body p-4">
      <h1 class="text-lg font-semibold mb-3">Вход</h1>
      <form method="post" class="grid gap-3">
        {% csrf_token %}
        <div>
          <label class="text-xs mb-1 block">Email или телефон</label>
          <input type="text" name="identifier" class="input input-bordered w-full" required>
        </div>
        <div>
          <label class="text-xs mb-1 block">Пароль</label>
          <input type="password" name="password" class="input input-bordered w-full" required>
        </div>
        {% if form.non_field_errors %}
          <div class="alert alert-error text-sm">{{ form.non_field_errors }}</div>
        {% endif %}
        <button class="btn btn-primary w-full">Войти</button>
      </form>
      <div class="divider my-3"></div>
      <a class="btn btn-outline w-full mb-2" href="/account/social/google/login/">Войти через Google</a>
      <form action="/account/twa/login/" method="post" class="mt-2">
        {% csrf_token %}
        <input type="hidden" name="initData" id="twa-initData">
        <button type="submit" class="btn btn-outline w-full">Войти через Telegram WebApp</button>
      </form>
      <div class="text-center mt-3 text-xs">
        Нет аккаунта? <a href="/account/register/" class="link">Зарегистрироваться</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
