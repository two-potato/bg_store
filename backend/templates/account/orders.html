{% extends "account/layout.html" %}
{% block account_main %}
<section id="account-main-content" class="cabinet-dark-main">
  <div class="cabinet-dark-hero compact">
    <div class="cabinet-dark-hero-title">Мои заказы</div>
    <div class="cabinet-dark-hero-sub">История заказов с быстрым просмотром без перезагрузки.</div>
  </div>
  <section class="cabinet-dark-panel">
    <h2 class="cabinet-dark-panel-title">Список заказов</h2>
    {% if orders %}
      {% include 'account/components/order_table.html' with orders=orders %}
    {% else %}
      <div class="alert">У вас пока нет заказов.</div>
    {% endif %}
  </section>
</section>
{% endblock %}
