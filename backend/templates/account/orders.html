{% extends "account/layout.html" %}
{% block account_main %}
<section id="account-main-content" class="account-2026__main">
  <div class="account-2026__hero compact">
    <div class="account-2026__hero-title">Мои заказы</div>
    <div class="account-2026__hero-sub">История заказов с быстрым просмотром без перезагрузки.</div>
  </div>
  <section class="account-2026__panel">
    <h2 class="account-2026__panel-title">Список заказов</h2>
    {% if orders %}
      {% include 'account/components/order_table.html' with orders=orders %}
    {% else %}
      <div class="alert">У вас пока нет заказов.</div>
    {% endif %}
  </section>
</section>
{% endblock %}
