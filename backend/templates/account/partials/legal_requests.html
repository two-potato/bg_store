{% if requests %}
  <ul class="divide-y" id="legal-requests">
    {% for r in requests %}
      <li class="p-3 flex items-center justify-between">
        <div>
          <div class="text-xs text-base-content/60">ИНН: {{ r.inn }}</div>
          <div id="req-prev-{{ r.id }}"
               hx-get="/api/commerce/lookup/party_preview?inn={{ r.inn }}"
               hx-trigger="load"
               hx-swap="innerHTML">
            <div class="text-xs text-base-content/60">Загружаю данные…</div>
          </div>
        </div>
        <div class="flex items-center gap-2">
        {% if r.status == 'pending' %}
          <span class="badge">на согласовании</span>
          <form hx-post="/account/legal/request/{{ r.id }}/cancel/" hx-target="#legal-requests" hx-swap="outerHTML">
            <button class="btn btn-sm btn-outline" type="submit">Отменить</button>
          </form>
        {% elif r.status == 'approved' %}
          <span class="badge badge-success">одобрено</span>
        {% else %}
          <span class="badge badge-error">отклонено</span>
        {% endif %}
        </div>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <div class="text-xs text-base-content/60" id="legal-requests">Заявок пока нет.</div>
{% endif %}
