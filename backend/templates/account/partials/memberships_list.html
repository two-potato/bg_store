{% if memberships %}
  <ul class="account-2026__list">
    {% for m in memberships %}
      <li class="p-3">
        <div class="font-semibold">{{ m.legal_entity.name }}</div>
        <div class="text-xs text-base-content/60">ИНН: {{ m.legal_entity.inn }} · Роль: {{ m.role }}</div>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <div class="alert">Пока нет привязанных юр лиц.</div>
{% endif %}
