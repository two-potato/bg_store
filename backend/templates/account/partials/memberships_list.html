{% if memberships %}
  <div class="account-grid-cards">
    {% for m in memberships %}
      <article class="account-entity-card">
        <div class="account-entity-card__head">
          <div>
            <div class="account-entity-card__title">{{ m.legal_entity.name }}</div>
            <div class="account-entity-card__meta">ИНН: {{ m.legal_entity.inn }}</div>
          </div>
          <div class="account-entity-card__tag">{{ m.role }}</div>
        </div>
        <div class="account-entity-card__actions">
          <a class="account-2026__panel-link"
             href="/account/orders/"
             hx-get="/account/orders/"
             hx-target="#account-main-content"
             hx-select="#account-main-content"
             hx-swap="outerHTML"
             hx-push-url="true">Заказы компании</a>
        </div>
      </article>
    {% endfor %}
  </div>
{% else %}
  <div class="alert">Пока нет привязанных юр лиц.</div>
{% endif %}
