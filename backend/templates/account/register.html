{% extends "shopfront/base.html" %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="card bg-base-100">
    <div class="card-body p-4">
      <h1 class="text-lg font-semibold mb-3">Регистрация</h1>
      <form method="post" class="grid gap-3">
        {% csrf_token %}
        <div>
          <label class="text-xs mb-1 block">Имя пользователя</label>
          <input type="text" name="username" class="input input-bordered w-full" required>
        </div>
        <div>
          <label class="text-xs mb-1 block">Email</label>
          <input type="email" name="email" class="input input-bordered w-full">
        </div>
        <div>
          <label class="text-xs mb-1 block">Телефон</label>
          <input type="text" name="phone" class="input input-bordered w-full">
        </div>
        <div>
          <label class="text-xs mb-1 block">Пароль</label>
          <input type="password" name="password1" class="input input-bordered w-full" required>
        </div>
        <div>
          <label class="text-xs mb-1 block">Повторите пароль</label>
          <input type="password" name="password2" class="input input-bordered w-full" required>
        </div>
        {% if form.non_field_errors %}
          <div class="alert alert-error text-sm">{{ form.non_field_errors }}</div>
        {% endif %}
        <button class="btn btn-primary w-full">Зарегистрироваться</button>
      </form>
      <div class="text-center mt-3 text-xs">
        Уже есть аккаунт? <a href="/account/login/" class="link">Войти</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
