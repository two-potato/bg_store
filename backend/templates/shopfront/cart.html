{% extends "shopfront/base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h5 m-0">Корзина</h1>
  {% if items %}
  <form hx-post="/cart/clear/" hx-target=".cart-container" hx-swap="innerHTML" hx-on::after-request="document.body.dispatchEvent(new Event('cartChanged'));">
    <button type="submit" class="btn btn-sm btn-outline-danger">
      <iconify-icon icon="tabler:trash"></iconify-icon>
      <span class="ms-1">Очистить</span>
    </button>
  </form>
  {% endif %}
  </div>
<div class="cart-container">
  {% include "shopfront/partials/cart_panel.html" %}
  {% if items %}
  <div class="mt-3 d-grid gap-2">
    <a href="/checkout/" class="btn btn-dark w-100">Оформить заказ</a>
  </div>
  {% endif %}
</div>
{% endblock %}
