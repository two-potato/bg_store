{% extends "shopfront/base.html" %}
{% block content %}
{% include "shopfront/components/catalog_header.html" %}
{% include "shopfront/components/tag_chips.html" %}

<section class="catalog-layout-neo">
  {% include "shopfront/components/product_grid.html" with products=products %}
    {% if has_next %}
      <div id="load-more"
         class="mt-3"
         hx-get="/catalog/?{% if querystring_base %}{{ querystring_base }}&{% endif %}page={{ next_page }}&fragment=grid_append"
         hx-trigger="revealed"
         hx-target="#product-grid"
         hx-swap="beforeend">
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 py-2 catalog-skeleton" aria-hidden="true">
        <div class="card bg-base-100 p-3 animate-pulse">
          <div class="h-40 rounded bg-base-200"></div>
          <div class="h-3 mt-3 rounded bg-base-200"></div>
          <div class="h-3 mt-2 rounded bg-base-200"></div>
        </div>
        <div class="card bg-base-100 p-3 animate-pulse">
          <div class="h-40 rounded bg-base-200"></div>
          <div class="h-3 mt-3 rounded bg-base-200"></div>
          <div class="h-3 mt-2 rounded bg-base-200"></div>
        </div>
        <div class="card bg-base-100 p-3 animate-pulse">
          <div class="h-40 rounded bg-base-200"></div>
          <div class="h-3 mt-3 rounded bg-base-200"></div>
          <div class="h-3 mt-2 rounded bg-base-200"></div>
        </div>
        <div class="card bg-base-100 p-3 animate-pulse">
          <div class="h-40 rounded bg-base-200"></div>
          <div class="h-3 mt-3 rounded bg-base-200"></div>
          <div class="h-3 mt-2 rounded bg-base-200"></div>
        </div>
      </div>
    </div>
  {% endif %}
</section>
{% endblock %}
