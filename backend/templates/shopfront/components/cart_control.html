<div class="cart-control min-h-10 flex items-center justify-center" data-pid="{{ pid }}" aria-live="polite">
  <button class="add btn btn-accent btn-sm w-full {% if in_stock|default:0 <= 0 %}btn-disabled{% endif %}"
          {% if in_stock|default:0 <= 0 %}disabled aria-disabled="true" title="Нет в наличии"{% endif %}
          hx-post="/cart/add/"
          hx-vals='{"product_id":"{{ pid }}","qty":1}'
          hx-swap="none">
    {% include 'shopfront/icons/shopping-bag.svg' %}
    <span class="ml-1">{% if in_stock|default:0 <= 0 %}Нет в наличии{% else %}В корзину{% endif %}</span>
  </button>
  <div class="stepper hidden flex flex-nowrap items-center gap-2">
    <form class="shrink-0" hx-post="/cart/update/" hx-vals='{"product_id":"{{ pid }}","op":"dec"}' hx-swap="none">
      <button class="btn btn-outline btn-sm" type="submit">{% include 'shopfront/icons/shopping-cart.svg' %}</button>
    </form>
    <span class="qty text-sm font-semibold inline-block w-8 text-center shrink-0">1</span>
    <form class="shrink-0" hx-post="/cart/update/" hx-vals='{"product_id":"{{ pid }}","op":"inc"}' hx-swap="none">
      <button class="btn btn-outline btn-sm" type="submit">{% include 'shopfront/icons/plus.svg' %}</button>
    </form>
  </div>
</div>
