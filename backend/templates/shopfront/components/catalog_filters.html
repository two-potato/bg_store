<div class="card bg-base-100 catalog-filters-card">
  <div class="card-body p-4">
    <form class="catalog-filters-form">
      <div class="mb-2">
        <label class="text-xs mb-1 block">Категория</label>
        <select class="select select-bordered select-sm w-full catalog-select-2026" name="category">
          <option value="">Любая</option>
          {% for c in category_rows %}
            <option value="{{ c.slug }}" {% if request.GET.category|default:'' == c.slug or request.GET.category|default:'' == c.id|stringformat:"s" %}selected{% endif %}>{{ c.label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-2">
        <label class="text-xs mb-1 block">Бренд</label>
        <select class="select select-bordered select-sm w-full catalog-select-2026" name="brand">
          <option value="">Любой</option>
          {% for b in brands %}
            <option value="{{ b.id }}" {% if request.GET.brand|default:'' == b.id|stringformat:"s" %}selected{% endif %}>{{ b.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-2">
        <label class="text-xs mb-1 block">Поиск</label>
        <input class="input input-bordered input-sm w-full" name="q" value="{{ request.GET.q|default:'' }}" placeholder="например: сироп">
      </div>
      <div class="mb-2">
        <label class="text-xs mb-1 block">Тег</label>
        <select class="select select-bordered select-sm w-full catalog-select-2026" name="tag">
          <option value="">Любой</option>
          {% for t in tags %}
            <option value="{{ t.id }}" {% if request.GET.tag|default:'' == t.id|stringformat:"s" %}selected{% endif %}>{{ t.name }}</option>
          {% endfor %}
        </select>
      </div>
      <button class="btn btn-primary btn-sm w-full">Фильтровать</button>
    </form>
  </div>
  </div>
