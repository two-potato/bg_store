<div class="mb-3">
  <form method="get" class="catalog-toolbar">
    <label class="catalog-toolbar__label" for="catalog-sort">Сортировка</label>
    <select id="catalog-sort" class="select select-bordered catalog-toolbar__select" name="sort" aria-label="Сортировка" onchange="this.form.submit()">
      <option value="new" {% if sort|default:'new' == 'new' %}selected{% endif %}>Сначала новинки</option>
      <option value="price_asc" {% if sort == 'price_asc' %}selected{% endif %}>По возрастанию цены</option>
      <option value="price_desc" {% if sort == 'price_desc' %}selected{% endif %}>По убыванию цены</option>
      <option value="rating_desc" {% if sort == 'rating_desc' %}selected{% endif %}>По рейтингу</option>
      <option value="name" {% if sort == 'name' %}selected{% endif %}>По алфавиту</option>
      <option value="promo" {% if sort == 'promo' %}selected{% endif %}>Сначала акции</option>
    </select>

    {# Preserve other filters #}
    {% if request.GET.category %}<input type="hidden" name="category" value="{{ request.GET.category }}">{% endif %}
    {% if request.GET.brand %}<input type="hidden" name="brand" value="{{ request.GET.brand }}">{% endif %}
    {% if request.GET.tag %}<input type="hidden" name="tag" value="{{ request.GET.tag }}">{% endif %}
  </form>
</div>
