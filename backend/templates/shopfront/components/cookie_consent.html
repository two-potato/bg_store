<aside id="cookie-consent" class="cookie-consent hidden" role="dialog" aria-live="polite" aria-label="Согласие на cookies">
  <div class="cookie-consent__text">
    Мы используем cookie и продуктовую аналитику, чтобы улучшать поиск, карточки товара, корзину и checkout.
    Аналитика и session replay включаются только после вашего согласия.
  </div>
  <div class="cookie-consent__actions">
    <button type="button" id="cookie-consent-accept" class="btn btn-primary btn-sm">Разрешить аналитику</button>
    <button type="button" id="cookie-consent-decline" class="btn btn-outline btn-sm">Только необходимые</button>
  </div>
</aside>
