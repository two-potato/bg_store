<aside id="cookie-consent" class="cookie-consent hidden" role="dialog" aria-live="polite" aria-label="Согласие на cookies">
  <div class="cookie-consent__text">
    Мы используем cookie для работы сайта, аналитики и улучшения сервиса.
    Продолжая использовать сайт, вы соглашаетесь с использованием cookie.
  </div>
  <div class="cookie-consent__actions">
    <button type="button" id="cookie-consent-accept" class="btn btn-primary btn-sm">Принять</button>
    <button type="button" id="cookie-consent-decline" class="btn btn-outline btn-sm">Отклонить</button>
  </div>
</aside>
