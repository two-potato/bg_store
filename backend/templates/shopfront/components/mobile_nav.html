<nav class="mobile-only mobile-nav-mint fixed bottom-0 left-0 right-0 z-50 border-t backdrop-blur" aria-label="Нижняя навигация">
  {% with path=request.path %}
  <ul class="grid grid-cols-4">
    <li>
      <a href="/" hx-boost="false" class="flex flex-col items-center justify-center py-2 text-xs gap-1 mobile-nav-mint-link {% if path == '/' %}is-active{% endif %}">
        <span class="mobile-nav-mint-link__icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M4 10.2 12 3.8l8 6.4"></path>
            <path d="M6.4 9.8V20h11.2V9.8"></path>
            <path d="M10.2 20v-4.8h3.6V20"></path>
            <path d="M7.8 6.8a7.2 7.2 0 0 1 8.4 0" opacity=".7"></path>
          </svg>
        </span>
        <span>Главная</span>
      </a>
    </li>
    <li>
      <a href="/catalog/" hx-boost="false" class="flex flex-col items-center justify-center py-2 text-xs gap-1 mobile-nav-mint-link {% if path|slice:':9' == '/catalog/' or path|slice:':9' == '/product/' %}is-active{% endif %}">
        <span class="mobile-nav-mint-link__icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <rect x="4" y="4" width="6.2" height="6.2" rx="1.8"></rect>
            <rect x="13.8" y="4" width="6.2" height="6.2" rx="1.8"></rect>
            <rect x="4" y="13.8" width="6.2" height="6.2" rx="1.8"></rect>
            <rect x="13.8" y="13.8" width="6.2" height="6.2" rx="1.8"></rect>
            <path d="M11.2 7.1h1.6"></path>
            <path d="M11.2 16.9h1.6"></path>
          </svg>
        </span>
        <span>Каталог</span>
      </a>
    </li>
    <li>
      <a href="/cart/" hx-boost="false" class="flex flex-col items-center justify-center py-2 text-xs gap-1 mobile-nav-mint-link mobile-nav-mint-link--cart {% if path|slice:':6' == '/cart/' %}is-active{% endif %}">
        <span class="mobile-cart-icon-wrap">
          <span class="mobile-nav-mint-link__icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <circle cx="9" cy="19.6" r="1.15"></circle>
              <circle cx="17.8" cy="19.6" r="1.15"></circle>
              <path d="M3.5 4.3h2.1l2.1 9.9h9.9l1.9-7.4H7"></path>
              <path d="M7.9 8.3h11"></path>
              <path d="M11.3 11.3h5.8"></path>
            </svg>
          </span>
          <span id="cart-badge-mobile"
                class="mobile-cart-badge hidden"
                hx-get="/cart/badge/"
                hx-push-url="false"
                hx-trigger="load, cartChanged from:body"
                hx-target="#cart-badge-mobile"
                hx-select="*"
                hx-swap="innerHTML">
            {% include "shopfront/partials/cart_badge.html" with count=cart_badge_count|default:0 subtotal=cart_badge_subtotal|default:0 %}
          </span>
        </span>
        <span>Корзина</span>
      </a>
    </li>
    <li>
      <a href="/account/" hx-boost="false" class="flex flex-col items-center justify-center py-2 text-xs gap-1 mobile-nav-mint-link {% if path|slice:':9' == '/account/' %}is-active{% endif %}">
        <span class="mobile-nav-mint-link__icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <circle cx="12" cy="8.2" r="3.2"></circle>
            <path d="M6 19.3c1.55-2.9 3.75-4.2 6-4.2s4.45 1.3 6 4.2"></path>
            <path d="M8.2 4.9a6.8 6.8 0 0 1 7.6 0" opacity=".65"></path>
          </svg>
        </span>
        <span>Профиль</span>
      </a>
    </li>
  </ul>
  {% endwith %}
</nav>
