<span id="cart-badge"
      class="indicator-item badge badge-error hidden cart-badge-pill"
      hx-get="/cart/badge/"
      hx-push-url="false"
      hx-trigger="load, cartChanged from:body"
      hx-target="#cart-badge"
      hx-select="*"
      hx-swap="innerHTML"
      hx-swap-oob="outerHTML">
  {% include "shopfront/partials/cart_badge.html" with count=count subtotal=subtotal %}
</span>
