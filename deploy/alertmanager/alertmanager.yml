route:
  receiver: "telegram-notify"
  group_by: ["alertname", "job", "instance", "container"]
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
      receiver: "telegram-notify"
      repeat_interval: 30m
    - matchers:
        - severity="warning"
      receiver: "telegram-notify"
      repeat_interval: 2h

receivers:
  - name: "telegram-notify"
    webhook_configs:
      - url: "http://bg-bot-notify:8080/notify/alertmanager"
        send_resolved: true
