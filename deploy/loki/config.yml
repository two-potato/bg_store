auth_enabled: false
server:
  http_listen_port: 3100
frontend:
  max_outstanding_per_tenant: 65535
querier:
  max_concurrent: 256
query_scheduler:
  max_outstanding_requests_per_tenant: 65535
ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  chunk_idle_period: 3m
  chunk_retain_period: 1m
  wal:
    dir: /wal
schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h
storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/boltdb-cache
  filesystem:
    directory: /loki/chunks
compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
limits_config:
  volume_enabled: true
  ingestion_rate_mb: 4
  ingestion_burst_size_mb: 6
chunk_store_config:
  max_look_back_period: 0s
table_manager:
  retention_deletes_enabled: true
  retention_period: 168h
ruler:
  alertmanager_url: http://alertmanager:9093
  enable_api: true
  ring:
    kvstore:
      store: inmemory
  rule_path: /tmp/loki/rules-temp
  storage:
    type: local
    local:
      directory: /etc/loki/rules
