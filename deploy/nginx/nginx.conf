events {}
http {
  include /etc/nginx/mime.types;
  sendfile on;
  server_tokens off;
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }
  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
  gzip_min_length 256;

  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
  }

  server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/potatofarm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/potatofarm.ru/privkey.pem;
    return 444;
  }

  server {
    listen 80;
    listen [::]:80;
    server_name potatofarm.ru www.potatofarm.ru;
    client_max_body_size 32m;

    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; connect-src 'self' https: wss:;" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # Локальный healthcheck для deploy-скрипта
    location = /health/ {
      default_type application/json;
      return 200 '{"ok": true}';
    }

    # Метрики Nginx для exporter внутри docker-сети
    location /nginx_status {
      stub_status;
      allow 127.0.0.1;
      allow 172.16.0.0/12;
      deny all;
      access_log off;
    }

    # HTTP-01 challenge для Let's Encrypt
    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
    }

    # Весь пользовательский трафик с HTTP -> HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

