events {}
http {
  include /etc/nginx/mime.types;
  sendfile on;
  server_tokens off;
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }
  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
  gzip_min_length 256;

  server {
    listen 80;
    listen [::]:80;
    server_name potatofarm.ru www.potatofarm.ru;
    client_max_body_size 32m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Локальный healthcheck для deploy-скрипта
    location = /health/ {
      default_type application/json;
      return 200 '{"ok": true}';
    }

    # Метрики Nginx для exporter внутри docker-сети
    location /nginx_status {
      stub_status;
      allow 127.0.0.1;
      allow 172.16.0.0/12;
      deny all;
      access_log off;
    }

    # HTTP-01 challenge для Let's Encrypt
    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
    }

    # Весь пользовательский трафик с HTTP -> HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 80;
    listen [::]:80;
    server_name grafana.potatofarm.ru;
    client_max_body_size 32m;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name potatofarm.ru www.potatofarm.ru;
    client_max_body_size 32m;

    ssl_certificate /etc/letsencrypt/live/potatofarm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/potatofarm.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /nginx_status { stub_status; allow 127.0.0.1; allow 172.16.0.0/12; deny all; access_log off; }

    location /static/ { alias /staticfiles/; access_log off; expires 7d; }
    location /media/  { alias /media/;       access_log off; expires 7d; }

    location / {
      resolver 127.0.0.11 valid=30s ipv6=off;
      set $backend_upstream backend:8000;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_pass http://$backend_upstream;
    }
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grafana.potatofarm.ru;

    ssl_certificate /etc/letsencrypt/live/potatofarm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/potatofarm.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
      resolver 127.0.0.11 valid=30s ipv6=off;
      set $grafana_upstream grafana:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://$grafana_upstream;
    }
  }
}
